<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOTARO — Trainer Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --primary: #3A6260;
  --primary-dark: #2C4E4C;
  --primary-darker: #1E3635;
  --primary-light: #5A8A87;
  --primary-faint: #EAF0EF;
  --accent: #F5F0DC;
  --bg: #FFFFFF;
  --bg-subtle: #F1F6F2;
  --bg-dark: #1E3635;
  --fg1: #1A2624;
  --fg2: #4A6360;
  --fg3: #8FA8A6;
  --fg-inv: #F5F0DC;
  --border: #DDE8E7;
  --border-strong: #C0D4D2;
  --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--sans); background: var(--bg-dark); color: var(--fg1); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header {
  background: var(--bg-dark);
  border-bottom: 1px solid rgba(93,138,135,0.2);
  padding: 0 28px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0; z-index: 1000;
}
.logo-text { font-weight: 700; font-size: 14px; letter-spacing: 0.18em; color: var(--fg-inv); }
.logo-sub { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--primary-light); margin-left: 16px; padding-left: 16px; border-left: 1px solid rgba(93,138,135,0.3); }
.header-left { display: flex; align-items: center; }
.header-right { display: flex; align-items: center; gap: 12px; }
.count-badge { font-family: var(--mono); font-size: 12px; color: var(--fg3); letter-spacing: 0.04em; }
.count-badge strong { color: var(--fg-inv); font-weight: 600; }
.view-toggle { display: flex; background: rgba(255,255,255,0.06); border: 1px solid rgba(93,138,135,0.3); border-radius: 6px; padding: 2px; gap: 1px; }
.view-toggle button { font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--fg3); background: none; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
.view-toggle button.active { background: rgba(255,255,255,0.1); color: var(--fg-inv); }
.btn-eintragen { font-family: var(--sans); font-size: 13px; font-weight: 600; background: var(--primary); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; transition: background 0.15s; }
.btn-eintragen:hover { background: var(--primary-dark); }

.main { flex: 1; display: flex; overflow: hidden; }
#map { flex: 1; }

.sidebar { width: 300px; background: var(--bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; transition: width 0.25s ease; }
.sidebar.hidden { width: 0; }
.sidebar-head { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sidebar-head h2 { font-size: 15px; font-weight: 600; color: var(--fg1); margin-bottom: 2px; }
.sidebar-meta { font-family: var(--mono); font-size: 11px; color: var(--fg3); letter-spacing: 0.04em; text-transform: uppercase; }
.trainer-list { flex: 1; overflow-y: auto; padding: 10px; }
.trainer-list::-webkit-scrollbar { width: 3px; }
.trainer-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
.country-group { margin-bottom: 6px; }
.country-label { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg3); padding: 8px 10px 4px; }
.trainer-row { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
.trainer-row:hover { background: var(--bg-subtle); }
.t-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--primary-faint); border: 1.5px solid var(--border-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--primary); overflow: hidden; }
.t-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.t-info { flex: 1; min-width: 0; }
.t-name { font-size: 13px; font-weight: 600; color: var(--fg1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.t-loc { font-size: 11px; color: var(--fg3); margin-top: 1px; }
.t-role { font-size: 11px; color: var(--primary-light); font-weight: 500; margin-top: 1px; }
.t-del { background: none; border: none; color: var(--border-strong); cursor: pointer; font-size: 14px; padding: 4px; border-radius: 4px; opacity: 0; transition: color 0.12s; }
.trainer-row:hover .t-del { opacity: 1; }
.t-del:hover { color: #C0392B; }
.empty-state { text-align: center; padding: 48px 20px; color: var(--fg3); }
.empty-state p { font-size: 13px; margin-top: 8px; }

.leaflet-popup-content-wrapper { background: var(--bg) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; box-shadow: 0 4px 20px rgba(26,38,36,0.14) !important; padding: 0 !important; }
.leaflet-popup-content { margin: 0 !important; }
.leaflet-popup-tip { background: var(--bg) !important; }
.leaflet-popup-close-button { color: var(--fg3) !important; font-size: 16px !important; top: 10px !important; right: 10px !important; }
.popup-inner { display: flex; align-items: center; gap: 12px; padding: 14px 16px 14px 14px; }
.popup-av { width: 46px; height: 46px; border-radius: 50%; background: var(--primary-faint); border: 1.5px solid var(--border-strong); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: var(--primary); overflow: hidden; }
.popup-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.popup-name { font-size: 14px; font-weight: 600; color: var(--fg1); margin-bottom: 2px; }
.popup-city { font-size: 12px; color: var(--fg2); }
.popup-role-tag { display: inline-block; font-size: 11px; font-weight: 600; background: var(--primary-faint); color: var(--primary); border-radius: 4px; padding: 2px 8px; margin-top: 5px; letter-spacing: 0.02em; }

.lot-pin {
  width: 36px; height: 36px;
  background: var(--primary);
  border: 2.5px solid #fff;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 10px rgba(26,38,36,0.3);
  overflow: hidden;
}
.lot-pin-inner {
  transform: rotate(45deg);
  font-family: var(--sans); font-size: 11px; font-weight: 700; color: #fff;
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
}

.overlay { position: fixed; inset: 0; background: rgba(26,38,36,0.65); z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.18s; backdrop-filter: blur(3px); }
.overlay.on { opacity: 1; pointer-events: all; }
.form-box { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; width: 400px; max-width: 94vw; padding: 28px 28px 24px; box-shadow: 0 16px 48px rgba(26,38,36,0.2); transform: translateY(8px); transition: transform 0.18s; }
.overlay.on .form-box { transform: translateY(0); }
.form-head { margin-bottom: 22px; }
.form-head h2 { font-size: 17px; font-weight: 700; color: var(--fg1); margin-bottom: 4px; }
.form-head p { font-size: 13px; color: var(--fg2); }
.f-group { margin-bottom: 14px; }
.f-group label { display: block; font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg2); margin-bottom: 6px; }
.f-group input { width: 100%; font-family: var(--sans); font-size: 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--fg1); outline: none; transition: border-color 0.12s; }
.f-group input:focus { border-color: var(--primary); }
.f-group input::placeholder { color: var(--fg3); }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.f-hint { font-size: 12px; color: var(--fg3); margin-top: 6px; min-height: 18px; font-family: var(--mono); }
.f-hint.err { color: #C0392B; }
.form-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel { font-family: var(--sans); font-size: 13px; font-weight: 600; flex: 1; background: var(--bg-subtle); border: 1.5px solid var(--border); color: var(--fg2); border-radius: 6px; padding: 10px; cursor: pointer; transition: background 0.12s; }
.btn-cancel:hover { background: var(--border); }
.btn-ok { font-family: var(--sans); font-size: 13px; font-weight: 600; flex: 2; background: var(--primary); border: none; color: #fff; border-radius: 6px; padding: 10px; cursor: pointer; transition: background 0.12s; }
.btn-ok:hover { background: var(--primary-dark); }
.btn-ok:disabled { opacity: 0.5; cursor: default; }

.leaflet-bar { border: 1px solid var(--border) !important; border-radius: 8px !important; overflow: hidden; box-shadow: 0 2px 8px rgba(26,38,36,0.1) !important; }
.leaflet-bar a { border-bottom-color: var(--border) !important; color: var(--fg1) !important; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="logo-text">LOTARO</span>
    <span class="logo-sub">Trainer-Standorte</span>
  </div>
  <div class="header-right">
    <span class="count-badge"><strong id="count">0</strong> Trainer</span>
    <div class="view-toggle">
      <button id="btn-karte" class="active" onclick="setView('karte')">Karte</button>
      <button id="btn-liste" onclick="setView('liste')">Liste</button>
    </div>
    <button class="btn-eintragen" onclick="openForm()">+ Eintragen</button>
  </div>
</header>

<div class="main">
  <div id="map"></div>
  <div class="sidebar hidden" id="sidebar">
    <div class="sidebar-head">
      <h2>Alle Trainer</h2>
      <div class="sidebar-meta" id="sidebar-meta">—</div>
    </div>
    <div class="trainer-list" id="trainer-list"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="form-box">
    <div class="form-head">
      <h2>Trainer eintragen</h2>
      <p>Name und Standort — wird auf der Karte gepinnt.</p>
    </div>
    <div class="f-group">
      <label>Name</label>
      <input type="text" id="f-name" placeholder="Vorname Nachname">
    </div>
    <div class="f-row">
      <div class="f-group">
        <label>Stadt</label>
        <input type="text" id="f-city" placeholder="z.B. München">
      </div>
      <div class="f-group">
        <label>Land</label>
        <input type="text" id="f-country" placeholder="z.B. Deutschland">
      </div>
    </div>
    <div class="f-group">
      <label>Rolle (optional)</label>
      <input type="text" id="f-role" placeholder="z.B. Senior Coach">
    </div>
    <div class="f-group">
      <label>Foto-URL (optional)</label>
      <input type="text" id="f-photo" placeholder="https://...">
    </div>
    <div class="f-hint" id="f-hint"></div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeForm()">Abbrechen</button>
      <button class="btn-ok" id="btn-ok" onclick="submitForm()">Auf Karte hinzufügen</button>
    </div>
  </div>
</div>

<script>
// ── Map ──────────────────────────────────────────────────────────────────────
const worldBounds = L.latLngBounds(L.latLng(-80, -180), L.latLng(85, 180));

const map = L.map('map', {
  center: [30, 15],
  zoom: 2,
  minZoom: 2,
  maxZoom: 16,
  maxBounds: worldBounds,
  maxBoundsViscosity: 1.0,
  worldCopyJump: false
});

// CartoDB Voyager — warme, schöne Farben, kein API Key nötig
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
  noWrap: true
}).addTo(map);

// ── State ────────────────────────────────────────────────────────────────────
let trainers = [];
let mmap = {};
const KEY = 'lotaro-trainers-v1';

async function load() {
  try {
    const r = await window.storage.get(KEY);
    trainers = r ? JSON.parse(r.value) : demo();
  } catch(e) { trainers = demo(); }
  render();
}

async function save() {
  try { await window.storage.set(KEY, JSON.stringify(trainers)); } catch(e) {}
}

function demo() {
  return [
    { id: 1, name: 'Anna Schmidt',  city: 'Berlin',    country: 'Deutschland', role: 'Senior Coach',   photo: '', lat: 52.520, lng: 13.405 },
    { id: 2, name: "James O'Brien", city: 'London',    country: 'UK',          role: 'Trainer',        photo: '', lat: 51.505, lng: -0.090 },
    { id: 3, name: 'Marie Dupont',  city: 'Paris',     country: 'Frankreich',  role: 'Coach',          photo: '', lat: 48.857, lng: 2.352  },
    { id: 4, name: 'Carlos Ruiz',   city: 'Barcelona', country: 'Spanien',     role: 'Trainer',        photo: '', lat: 41.385, lng: 2.173  },
    { id: 5, name: 'Yuki Tanaka',   city: 'Tokyo',     country: 'Japan',       role: 'Senior Trainer', photo: '', lat: 35.689, lng: 139.692},
  ];
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const ini = name => name.trim().split(/\s+/).map(n => n[0]).join('').toUpperCase().slice(0,2);

function avHTML(t) {
  if (t.photo) return `<img src="${t.photo}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`;
  return ini(t.name);
}

// ── Markers ──────────────────────────────────────────────────────────────────
function makeIcon(t) {
  return L.divIcon({
    className: '',
    html: `<div class="lot-pin"><div class="lot-pin-inner">${t.photo ? `<img src="${t.photo}" style="width:32px;height:32px;object-fit:cover;border-radius:50%;transform:rotate(45deg);" onerror="this.outerHTML='<span>${ini(t.name)}</span>'">` : ini(t.name)}</div></div>`,
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -38]
  });
}

function popupHTML(t) {
  return `<div class="popup-inner">
    <div class="popup-av">${avHTML(t)}</div>
    <div>
      <div class="popup-name">${t.name}</div>
      <div class="popup-city">${t.city}, ${t.country}</div>
      ${t.role ? `<div class="popup-role-tag">${t.role}</div>` : ''}
    </div>
  </div>`;
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  Object.values(mmap).forEach(m => map.removeLayer(m));
  mmap = {};
  trainers.forEach(t => {
    if (t.lat == null) return;
    const m = L.marker([t.lat, t.lng], { icon: makeIcon(t) });
    m.bindPopup(popupHTML(t), { maxWidth: 260 });
    m.addTo(map);
    mmap[t.id] = m;
  });
  document.getElementById('count').textContent = trainers.length;
  renderList();
}

function renderList() {
  const el = document.getElementById('trainer-list');
  if (!trainers.length) {
    el.innerHTML = `<div class="empty-state"><p>Noch keine Trainer eingetragen.</p></div>`;
    document.getElementById('sidebar-meta').textContent = '—';
    return;
  }
  const grouped = {};
  trainers.forEach(t => (grouped[t.country] = grouped[t.country] || []).push(t));
  const nc = Object.keys(grouped).length;
  document.getElementById('sidebar-meta').textContent = `${trainers.length} Trainer · ${nc} ${nc===1?'Land':'Länder'}`;
  el.innerHTML = Object.entries(grouped).sort(([a],[b]) => a.localeCompare(b)).map(([country, list]) =>
    `<div class="country-group">
      <div class="country-label">${country}</div>
      ${list.map(t => `
        <div class="trainer-row" onclick="flyTo(${t.id})">
          <div class="t-avatar">${avHTML(t)}</div>
          <div class="t-info">
            <div class="t-name">${t.name}</div>
            <div class="t-loc">${t.city}</div>
            ${t.role ? `<div class="t-role">${t.role}</div>` : ''}
          </div>
          <button class="t-del" onclick="event.stopPropagation();del(${t.id})" title="Entfernen">✕</button>
        </div>`).join('')}
    </div>`).join('');
}

function flyTo(id) {
  const t = trainers.find(x => x.id === id);
  if (!t || t.lat == null) return;
  map.flyTo([t.lat, t.lng], 7, { duration: 1.1 });
  setTimeout(() => mmap[id] && mmap[id].openPopup(), 1200);
}

function del(id) {
  trainers = trainers.filter(t => t.id !== id);
  save(); render();
}

function setView(v) {
  document.getElementById('btn-karte').classList.toggle('active', v === 'karte');
  document.getElementById('btn-liste').classList.toggle('active', v === 'liste');
  document.getElementById('sidebar').classList.toggle('hidden', v === 'karte');
  setTimeout(() => map.invalidateSize(), 260);
}

function openForm() {
  document.getElementById('overlay').classList.add('on');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

function closeForm() {
  document.getElementById('overlay').classList.remove('on');
  ['f-name','f-city','f-country','f-role','f-photo'].forEach(id => document.getElementById(id).value = '');
  setHint('', false);
  const btn = document.getElementById('btn-ok');
  btn.textContent = 'Auf Karte hinzufügen';
  btn.disabled = false;
}

function setHint(msg, err) {
  const el = document.getElementById('f-hint');
  el.textContent = msg;
  el.className = 'f-hint' + (err ? ' err' : '');
}

async function geocode(city, country) {
  const q = encodeURIComponent(`${city}, ${country}`);
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1`);
    const d = await r.json();
    if (d && d[0]) return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
  } catch(e) {}
  return null;
}

async function submitForm() {
  const name    = document.getElementById('f-name').value.trim();
  const city    = document.getElementById('f-city').value.trim();
  const country = document.getElementById('f-country').value.trim();
  const role    = document.getElementById('f-role').value.trim();
  const photo   = document.getElementById('f-photo').value.trim();

  if (!name || !city || !country) { setHint('Bitte Name, Stadt und Land ausfüllen.', true); return; }

  const btn = document.getElementById('btn-ok');
  btn.textContent = 'Suche Koordinaten…';
  btn.disabled = true;
  setHint(`Suche "${city}" …`, false);

  const coords = await geocode(city, country);
  if (!coords) {
    setHint('Stadt nicht gefunden — bitte prüfen.', true);
    btn.textContent = 'Auf Karte hinzufügen';
    btn.disabled = false;
    return;
  }

  const t = { id: Date.now(), name, city, country, role, photo, lat: coords.lat, lng: coords.lng };
  trainers.push(t);
  await save();
  render();
  closeForm();
  setTimeout(() => flyTo(t.id), 300);
}

document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeForm(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeForm(); });

load();
</script>
</body>
</html>
